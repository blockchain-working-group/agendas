name: "Propose a Project (Public Tech Lab)"
description: "Suggest a new project, prototype, or pilot to run through a public tech lab"
title: "Project Proposal: [short name]"
labels: ["type:project", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Propose a Project (Public Tech Lab)
        Use this template to propose an open, collaborative project to be piloted in the Blockchain Group's Public Tech Lab.

  - type: input
    id: title
    attributes:
      label: "Project Title"
      placeholder: "e.g. Blockchain-anchored Public Notices"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: "Summary"
      description: "Briefly describe what this project aims to achieve and why it matters."
      placeholder: "e.g. Enable verifiable publishing of city ordinances on-chain."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: "Category"
      options:
        - Pilot with a public partner
        - Open-source prototype / repo
        - Publish learnings and metrics

  - type: textarea
    id: context
    attributes:
      label: "Context"
      description: "Expected outcomes, timeline, collaborators, and any risks or dependencies."

  - type: textarea
    id: links
    attributes:
      label: "Links or References"
      description: "Link to related issues, RFCs, repos, or prior art."

  - type: markdown
    attributes:
      value: |
        ---
        **Action:** Review proposal. If accepted, add to the Public Tech Lab backlog and schedule for an upcoming session.
