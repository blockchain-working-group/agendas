name: "Propose a Speaker"
description: "Volunteer to share your expertise, experience, or a story at an upcoming session"
title: "Speaker Proposal: [topic or title]"
labels: ["type:speaker", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Propose a Speaker
        Use this form to propose yourself (or another person) as a speaker for a Blockchain Group session.

  - type: input
    id: title
    attributes:
      label: "Talk Title or Topic"
      placeholder: "e.g. Civic identity through blockchain registries"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: "Summary"
      description: "Briefly describe what will be covered and what participants can learn."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: "Category"
      options:
        - Lightning talk (5-10 min)
        - Feature talk (20-30 min)
        - Panel / fireside chat
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "Speaker Details"
      description: "Speaker name, affiliation, and availability."
    validations:
      required: true

  - type: textarea
    id: links
    attributes:
      label: "Links or References"
      description: "Link to slides, repos, or related material."

  - type: markdown
    attributes:
      value: |
        ---
        **Action:** Add to speaker queue. Confirm timing and format, then schedule on an upcoming agenda.
