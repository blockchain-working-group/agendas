name: "Propose a Meeting Topic"
description: "Suggest a topic or theme for a future Blockchain Group meeting or study session"
title: "Topic Proposal: [topic]"
labels: ["type:topic", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Propose a Meeting Topic
        Suggest a subject, reading, or discussion theme for a future group meeting.

  - type: input
    id: title
    attributes:
      label: "Topic Title"
      placeholder: "e.g. Tokenized Public Records"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: "Summary"
      description: "Why is this topic important or timely?"
      placeholder: "Summarize the problem, relevance, or learning opportunity."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: "Category"
      options:
        - Deep-dive on standards / RFCs
        - Case studies and demos
        - Reading group selection
        - Policy or governance topic
        - Open Q&A / roundtable

  - type: textarea
    id: context
    attributes:
      label: "Desired Outcomes"
      description: "What do you hope we'll take away or decide on?"

  - type: textarea
    id: links
    attributes:
      label: "Links or References"
      description: "Link to papers, repos, or websites."

  - type: markdown
    attributes:
      value: |
        ---
        **Action:** Add to the topic backlog. Schedule on a future agenda when a slot is available.
