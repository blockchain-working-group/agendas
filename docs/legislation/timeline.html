---
layout: default
title: Legislation Timeline
nav_id: legislation
---

<h1 class="text-3xl font-semibold">Legislation Timeline</h1>
<p class="text-slate-600 max-w-3xl">Blockchain-related legislation and regulatory actions, newest first. Click an event to open its source.</p>

<div class="mt-4 flex flex-wrap gap-3">
  <a
    href="{{ '/legislation/' | relative_url }}"
    class="inline-flex items-center rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold hover:border-indigo-400 hover:text-indigo-700"
  >Back to Watchlist</a>
</div>

<div class="mt-4 flex flex-wrap gap-2 text-xs">
  <span class="inline-flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-full bg-emerald-500"></span> Enacted</span>
  <span class="inline-flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-full bg-amber-500"></span> Passed</span>
  <span class="inline-flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-full bg-sky-500"></span> Pending</span>
  <span class="inline-flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-full bg-slate-400"></span> Introduced</span>
</div>

<div class="mt-4 flex flex-wrap gap-2 text-xs">
  <button
    class="tl-filter rounded-full border border-slate-300 px-3 py-1 font-medium hover:border-indigo-400 data-[active]:bg-indigo-600 data-[active]:text-white data-[active]:border-indigo-600"
    data-level="all"
    data-active
  >All</button>
  <button
    class="tl-filter rounded-full border border-slate-300 px-3 py-1 font-medium hover:border-indigo-400 data-[active]:bg-indigo-600 data-[active]:text-white data-[active]:border-indigo-600"
    data-level="international"
  >International</button>
  <button
    class="tl-filter rounded-full border border-slate-300 px-3 py-1 font-medium hover:border-indigo-400 data-[active]:bg-indigo-600 data-[active]:text-white data-[active]:border-indigo-600"
    data-level="us_federal"
  >U.S. Federal</button>
  <button
    class="tl-filter rounded-full border border-slate-300 px-3 py-1 font-medium hover:border-indigo-400 data-[active]:bg-indigo-600 data-[active]:text-white data-[active]:border-indigo-600"
    data-level="us_state"
  >U.S. State</button>
</div>

<div id="timeline" class="mt-8 relative ml-4 md:ml-0">
  <!-- rendered by JS -->
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  var events = [
    {% for item in site.data.legislation %}
    {
      year: {{ item.year }},
      level: "{{ item.level }}",
      title: {{ item.title | jsonify }},
      summary: {{ item.summary | jsonify }},
      status: "{{ item.status }}",
      jurisdiction: "{{ item.jurisdiction }}",
      url: "{{ item.url }}"
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  var statusColors = {
    enacted:    { bg: "bg-emerald-50",  border: "border-emerald-400", dot: "bg-emerald-500", label: "Enacted" },
    passed:     { bg: "bg-amber-50",    border: "border-amber-400",   dot: "bg-amber-500",   label: "Passed" },
    pending:    { bg: "bg-sky-50",      border: "border-sky-400",     dot: "bg-sky-500",     label: "Pending" },
    introduced: { bg: "bg-slate-50",    border: "border-slate-300",   dot: "bg-slate-400",   label: "Introduced" }
  };

  var container = document.getElementById("timeline");

  function render(filter) {
    container.innerHTML = "";

    var filtered = filter === "all"
      ? events.slice()
      : events.filter(function (e) { return e.level === filter; });

    filtered.sort(function (a, b) { return b.year - a.year; });

    if (filtered.length === 0) {
      container.innerHTML = '<p class="py-8 text-slate-500 text-sm">No items match this filter.</p>';
      return;
    }

    // Group by year
    var years = [];
    var yearMap = {};
    filtered.forEach(function (ev) {
      if (!yearMap[ev.year]) {
        yearMap[ev.year] = [];
        years.push(ev.year);
      }
      yearMap[ev.year].push(ev);
    });

    // Vertical line
    var line = document.createElement("div");
    line.className = "absolute left-4 md:left-24 top-0 bottom-0 w-0.5 bg-slate-200";
    container.appendChild(line);

    years.forEach(function (year) {
      // Year label
      var yearEl = document.createElement("div");
      yearEl.className = "relative pl-12 md:pl-36 pb-2 pt-6 first:pt-0";

      var yearDot = document.createElement("div");
      yearDot.className = "absolute left-2.5 md:left-[5.25rem] w-4 h-4 rounded-full bg-indigo-600 border-2 border-white ring-2 ring-indigo-600 top-7 first:top-1";
      yearEl.appendChild(yearDot);

      var yearLabel = document.createElement("div");
      yearLabel.className = "text-lg font-semibold text-indigo-600";
      yearLabel.textContent = year;
      yearEl.appendChild(yearLabel);

      container.appendChild(yearEl);

      // Events for this year
      yearMap[year].forEach(function (ev) {
        var colors = statusColors[ev.status] || statusColors.introduced;

        var row = document.createElement("div");
        row.className = "relative pl-12 md:pl-36 pb-3";

        // Small dot on the line
        var dot = document.createElement("div");
        dot.className = "absolute left-3 md:left-[5.5rem] w-2.5 h-2.5 rounded-full " + colors.dot + " top-3";
        row.appendChild(dot);

        // Connector from line to card
        var conn = document.createElement("div");
        conn.className = "absolute left-[1.4rem] md:left-[6.1rem] w-5 md:w-6 h-0.5 bg-slate-200 top-[1.1rem]";
        row.appendChild(conn);

        // Card
        var card = document.createElement("a");
        card.href = ev.url;
        card.target = "_blank";
        card.rel = "noopener";
        card.className = "block rounded-xl border " + colors.border + " " + colors.bg + " p-4 hover:shadow-md transition-shadow max-w-2xl";

        var header = document.createElement("div");
        header.className = "flex flex-wrap items-center gap-2";

        var title = document.createElement("span");
        title.className = "font-semibold text-sm text-slate-900";
        title.textContent = ev.title;
        header.appendChild(title);

        var badge = document.createElement("span");
        badge.className = "text-[10px] font-medium px-2 py-0.5 rounded-full " + colors.border + " border";
        badge.textContent = colors.label;
        header.appendChild(badge);

        card.appendChild(header);

        var meta = document.createElement("div");
        meta.className = "text-xs text-slate-500 mt-1";
        meta.textContent = ev.jurisdiction + " · " + ev.year;
        card.appendChild(meta);

        var desc = document.createElement("p");
        desc.className = "text-sm text-slate-600 mt-2 leading-relaxed";
        desc.textContent = ev.summary;
        card.appendChild(desc);

        row.appendChild(card);
        container.appendChild(row);
      });
    });
  }

  // Filter buttons
  document.querySelectorAll(".tl-filter").forEach(function (btn) {
    btn.addEventListener("click", function () {
      document.querySelectorAll(".tl-filter").forEach(function (b) { b.removeAttribute("data-active"); });
      btn.setAttribute("data-active", "");
      render(btn.getAttribute("data-level"));
    });
  });

  render("all");
});
</script>
