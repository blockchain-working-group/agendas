<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>{{ page.title }} · ACT-IAC Blockchain WG</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-white via-slate-50 to-white text-slate-900">
  <header class="border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto max-w-6xl px-4 py-4 flex items-center justify-between">
      <a
        href="{{ '/' | relative_url }}"
        class="font-semibold tracking-tight text-lg"
      >ACT-IAC Blockchain Working Group</a>
      {% include nav.html %}
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 pb-16 pt-10 {{ page.main_class | default: 'space-y-8' }}">
    {{ content }}
  </main>

  <footer class="border-t border-slate-200 bg-white">
    <div class="mx-auto max-w-6xl px-4 py-6 flex flex-wrap items-center justify-between gap-4 text-sm text-slate-600">
      <div>
        Weekly meeting link: <a
          class="text-indigo-600 hover:text-indigo-500"
          href="https://meet.google.com/iyg-zqve-wne"
        >https://meet.google.com/iyg-zqve-wne</a>
      </div>
      <nav class="flex items-center gap-4">
        <a
          class="hover:text-indigo-600"
          href="{{ '/glossary/' | relative_url }}"
        >Glossary</a>
        <a
          class="hover:text-indigo-600"
          href="{{ '/resources/' | relative_url }}"
        >Resources</a>
        <a
          class="hover:text-indigo-600"
          href="https://github.com/blockchain-working-group/agendas"
          target="_blank"
          rel="noopener"
          title="GitHub"
        ><svg
            class="h-5 w-5"
            fill="currentColor"
            viewBox="0 0 16 16"
            aria-hidden="true"
          ><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.63 7.63 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg></a>
      </nav>
    </div>
  </footer>
</body>
</html>
